name: Run tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install AJV CLI
      run: npm install

    - name: Validate JSON Schemas
      run: |
        npm run validate

    - name: Lint
      run: |
        npm run lint
